<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Captcha Run+</title>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>

body{
    margin:0;
    min-height:100vh;
    background:#0b0d12;
    font-family:Arial;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:440px;
    background:#151925;
    border-radius:18px;
    padding:25px;
    border:1px solid #2a3142;
}

h1{
    text-align:center;
    margin-top:0;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#5865f2;
    color:white;
    font-size:16px;
    margin-top:12px;
    cursor:pointer;
}

button:hover{
    background:#6f7bff;
}

#timer{
    font-size:34px;
    text-align:center;
    margin:10px 0;
    font-weight:bold;
}

#result{
    text-align:center;
    min-height:25px;
}

.panel{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    font-size:14px;
    color:#b5bfd6;
}

.best{
    color:#00ff9d;
}

.badge{
    padding:4px 8px;
    background:#222838;
    border-radius:8px;
}

.g-recaptcha{
    display:none;
    justify-content:center;
    margin-top:15px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    background:#222838;
    color:white;
}

.score{
    display:flex;
    justify-content:space-between;
    padding:8px;
    margin-top:6px;
    background:#1c2230;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Captcha Run+</h1>

<div id="timer">0.00s</div>

<div class="panel">
<div>Attempts: <span id="attempts">0</span></div>
<div>Best: <span id="best">--</span></div>
</div>

<button id="goBtn" onclick="startRun()">GO</button>

<div id="captchaBox" class="g-recaptcha"
data-sitekey="6LcIyfQsAAAAAFhb6QSxRHfGwinojWKRvWl6ds-g">
</div>

<button id="checkBtn" onclick="checkCaptcha()" style="display:none;">
Check
</button>

<div id="result"></div>

<div id="nameBox" style="display:none;">
<input id="playerName" placeholder="Name">
<button onclick="submitScore()">Save Score</button>
</div>

<h3>Top 10</h3>
<div id="leaderboard"></div>

</div>

<script>

const WORKER_URL =
"https://elithenpc.elithenpc.workers.dev/";

let startTime = 0;
let timer = null;
let finalTime = 0;

let attempts = 0;
let bestTime = null;

function startRun(){

    document.getElementById("goBtn").style.display="none";
    document.getElementById("captchaBox").style.display="flex";
    document.getElementById("checkBtn").style.display="block";

    document.getElementById("result").innerText="";

    let countdown = 3;

    document.getElementById("timer").innerText="3";

    let cd = setInterval(()=>{

        countdown--;

        if(countdown<=0){
            clearInterval(cd);
            startTimer();
        }else{
            document.getElementById("timer").innerText=countdown;
        }

    },1000);
}

function startTimer(){

    startTime = Date.now();

    clearInterval(timer);

    timer = setInterval(()=>{

        document.getElementById("timer").innerText=
        ((Date.now()-startTime)/1000).toFixed(2)+"s";

    },10);
}

async function checkCaptcha(){

    const token = grecaptcha.getResponse();

    const result = document.getElementById("result");

    if(!token){
        result.innerText="Complete captcha first";
        return;
    }

    const res = await fetch(WORKER_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({token})
    });

    const data = await res.json();

    attempts++;
    document.getElementById("attempts").innerText=attempts;

    if(data.success){

        clearInterval(timer);

        finalTime=((Date.now()-startTime)/1000).toFixed(2);

        document.getElementById("timer").innerText=finalTime+"s";

        result.innerText="Passed ✔";

        if(!bestTime || finalTime<bestTime){
            bestTime=finalTime;
            document.getElementById("best").innerText=bestTime+"s";
        }

        document.getElementById("checkBtn").innerText="Restart";
        document.getElementById("checkBtn").onclick=restartRun;

        const scores = await getScores();

        if(scores.length<10 || Number(finalTime)<Number(scores[scores.length-1].time)){
            document.getElementById("nameBox").style.display="block";
        }

    }else{
        result.innerText="Failed ❌";
        grecaptcha.reset();
    }
}

function restartRun(){

    grecaptcha.reset();

    clearInterval(timer);

    document.getElementById("timer").innerText="0.00s";

    document.getElementById("result").innerText="";

    document.getElementById("nameBox").style.display="none";

    document.getElementById("playerName").value="";

    document.getElementById("checkBtn").innerText="Check";
    document.getElementById("checkBtn").onclick=checkCaptcha;

    document.getElementById("goBtn").style.display="block";
    document.getElementById("captchaBox").style.display="none";
    document.getElementById("checkBtn").style.display="none";
}

async function submitScore(){

    const name=document.getElementById("playerName").value.trim();
    if(!name)return;

    await fetch(WORKER_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({name,time:Number(finalTime)})
    });

    document.getElementById("nameBox").style.display="none";

    loadLeaderboard();

    restartRun();
}

async function getScores(){
    const res=await fetch(WORKER_URL);
    return await res.json();
}

async function loadLeaderboard(){

    const scores=await getScores();

    const board=document.getElementById("leaderboard");
    board.innerHTML="";

    scores.forEach((s,i)=>{

        const div=document.createElement("div");
        div.className="score";

        div.innerHTML=
        `<span>#${i+1} ${s.name}</span>
         <span>${s.time}s</span>`;

        board.appendChild(div);
    });
}

loadLeaderboard();

</script>

</body>
</html>
