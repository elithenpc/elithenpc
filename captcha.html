<!DOCTYPE html>
<html>
<head>
  <title>Captcha Gate</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>

<body style="font-family: Arial; padding: 40px;">

  <h2>Human check</h2>

  <div class="g-recaptcha" data-sitekey="6LcIyfQsAAAAAFhb6QSxRHfGwinojWKRvWl6ds-g"></div>

  <br>

  <button onclick="checkCaptcha()">Check</button>

  <p id="result"></p>

  <script>
    async function checkCaptcha() {
      const token = grecaptcha.getResponse();
      const result = document.getElementById("result");

      if (!token) {
        result.innerText = "No captcha completed.";
        return;
      }

      try {
        const res = await fetch("https://elithenpc.elithenpc.workers.dev/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ token })
        });

        const data = await res.json();

        if (data.success) {
          result.innerText = "Passed ✔";
        } else {
          result.innerText = "Failed ❌";
        }

      } catch (err) {
        result.innerText = "Error contacting verification server.";
      }
    }
  </script>

</body>
</html>
