<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Captcha Leaderboard</title>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>

body{
    margin:0;
    min-height:100vh;
    background:#0f1117;
    font-family:Arial,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:420px;
    background:#1a1d26;
    border:2px solid #2e3445;
    border-radius:18px;
    padding:30px;
    box-shadow:
        0 0 25px rgba(0,0,0,0.45);
}

h1{
    margin-top:0;
    text-align:center;
    font-size:32px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#5865f2;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
    margin-top:15px;
}

button:hover{
    transform:scale(1.02);
    background:#6d78ff;
}

#result{
    text-align:center;
    font-size:20px;
    margin-top:18px;
    min-height:30px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    margin-top:15px;
    background:#2a3040;
    color:white;
    box-sizing:border-box;
    font-size:16px;
}

#leaderboard{
    margin-top:25px;
}

.score{
    background:#252b38;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
}

.g-recaptcha{
    display:flex;
    justify-content:center;
}

.top{
    color:#ffd700;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Captcha Run</h1>

<div class="g-recaptcha"
data-sitekey="6LcIyfQsAAAAAFhb6QSxRHfGwinojWKRvWl6ds-g">
</div>

<button onclick="checkCaptcha()">
Check
</button>

<div id="result"></div>

<div id="nameBox" style="display:none;">

<input
id="playerName"
maxlength="20"
placeholder="Enter your name">

<button onclick="submitScore()">
Save Score
</button>

</div>

<h2>Top 10</h2>

<div id="leaderboard"></div>

</div>

<script>

const WORKER_URL =
"https://elithenpc.elithenpc.workers.dev/";

let startTime = Date.now();
let finalTime = 0;

async function checkCaptcha(){

    const token = grecaptcha.getResponse();

    const result =
    document.getElementById("result");

    if(!token){
        result.innerText =
        "Complete the captcha first.";
        return;
    }

    try{

        const res = await fetch(
            WORKER_URL,
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({ token })
            }
        );

        const data = await res.json();

        if(data.success){

            finalTime =
            ((Date.now()-startTime)/1000)
            .toFixed(2);

            result.innerHTML =
            `Passed ✔<br>${finalTime}s`;

            const scores = await getScores();

            if(
                scores.length < 10 ||
                Number(finalTime) <
                Number(scores[scores.length-1].time)
            ){
                document
                .getElementById("nameBox")
                .style.display = "block";
            }

        }else{

            result.innerText =
            "Failed ❌";

        }

    }catch(err){

        result.innerText =
        "Server error.";

    }

    grecaptcha.reset();
}

async function submitScore(){

    const name =
    document.getElementById("playerName")
    .value
    .trim();

    if(!name) return;

    await fetch(
        WORKER_URL,
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                name,
                time:Number(finalTime)
            })
        }
    );

    document
    .getElementById("nameBox")
    .style.display = "none";

    document
    .getElementById("playerName")
    .value = "";

    loadLeaderboard();

    startTime = Date.now();
}

async function getScores(){

    const res =
    await fetch(WORKER_URL);

    return await res.json();
}

async function loadLeaderboard(){

    const scores =
    await getScores();

    const board =
    document.getElementById("leaderboard");

    board.innerHTML = "";

    scores.forEach((score,index)=>{

        const div =
        document.createElement("div");

        div.className = "score";

        if(index === 0){
            div.classList.add("top");
        }

        div.innerHTML =
        `<span>#${index+1} ${score.name}</span>
        <span>${score.time}s</span>`;

        board.appendChild(div);

    });
}

loadLeaderboard();

</script>

</body>
</html>
